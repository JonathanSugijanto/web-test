  <script>
    function generateRandomGridData(cols, rows, umin, umax, unum, sepc=";") {
      const grid = [];
      const gridTxt = [];

      // step size (IMPORTANT: unum includes endpoints)
      const step = (umax - umin) / (unum - 1);

      // build allowed values
      const values = [];
      for (let i = 0; i < unum; i++) {
        values.push(umin + i * step);
      }

      // generate grid
      for (let r = 0; r < rows; r++) {
        const row = [];
        const rowTxt = [];

        for (let c = 0; c < cols; c++) {
          // pick random value from allowed set
          const v = values[Math.floor(Math.random() * values.length)];

          // format like ".45" instead of "0.45"
          const vTxt = v.toFixed(2).replace(/^0/, "");

          row.push(v);
          rowTxt.push(vTxt);
        }
        grid.push(row);
        gridTxt.push(rowTxt.join(sepc));
      }

      // return as multiline string
      return grid, gridTxt.join("\n");
    }
    function readGridDataFromTextarea(id, sepc=";") {
      const el = document.getElementById(id);
      if (!(el instanceof HTMLTextAreaElement)) return null;

      const lines = el.value.trim().split("\n");

      const grid = lines.map(line => {
        return line.split(sepc).map(v => parseFloat(v));
      });

      return grid; // 2D array [rows][cols]
    }
    function drawGridOnCanvas(canvasId, grid, CL_arr, umin, umax, unum=null) {
      if(unum === null) {
        // infer from CL_arr length
        unum = CL_arr.length;
      }
      
      const canvas = document.getElementById(canvasId);
      if (!(canvas instanceof HTMLCanvasElement)) return;

      const ctx = canvas.getContext("2d");

      const rows = grid.length;
      const cols = grid[0].length;

      // set canvas size (important!)
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;

      const cellW = canvas.width / cols;
      const cellH = canvas.height / rows;

      const step = (umax - umin) / (unum - 1);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const v = grid[r][c];

          // compute index
          let idx = Math.round((v - umin) / step);

          // clamp (safety)
          idx = Math.max(0, Math.min(CL_arr.length - 1, idx));

          ctx.fillStyle = CL_arr[idx];
          ctx.fillRect(c * cellW, r * cellH, cellW, cellH);
        }
      }
    }

    function generateRandomChooseData(N, xmin, xmax, ymin, ymax) {
      const chooseData = [];
      for (let i = 0; i < N; i++) {
        let x = Math.floor(Math.random() * (xmax - xmin + 1)) + xmin;
        let y = Math.floor(Math.random() * (ymax - ymin + 1)) + ymin;
        if(x == xmax) x = xmax - 1; // ensure within bounds
        if(y == ymax) y = ymax - 1; // ensure within bounds
        chooseData.push({x, y});
      }
      console.log(`Generated choose point: (${chooseData[0].x}, ${chooseData[0].y}), (${chooseData[1].x}, ${chooseData[1].y})`);
      return chooseData;
    }

    function chooseGridOnCanvas(canvasId, chooseData, rows, cols, CL_arr) {
      const canvas = document.getElementById(canvasId);
      if (!(canvas instanceof HTMLCanvasElement)) return;

      const ctx = canvas.getContext("2d");

      const cellW = canvas.width / cols;
      const cellH = canvas.height / rows;

      chooseData.forEach((point, idx) => {
        const {x, y} = point;
        ctx.fillStyle = CL_arr[idx % CL_arr.length];
        ctx.fillRect(x * cellW, y * cellH, cellW, cellH);
      });
    }
  </script>
